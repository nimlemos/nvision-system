<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nvision Informatica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3.5rem;
            color: #f39c12;
            margin-bottom: 0.5rem;
            animation: digitando 1.5s infinite;
        }

        @keyframes digitando {
            0%, 10% { transform: rotateX(0deg) scale(1); }
            25%, 35% { transform: rotateX(15deg) scale(1.05); }
            50%, 60% { transform: rotateX(0deg) scale(1); }
            75%, 85% { transform: rotateX(15deg) scale(1.05); }
            100% { transform: rotateX(0deg) scale(1); }
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.3rem;
        }

        .logo-subtitle {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            color: #f39c12;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 0 4px rgba(243, 156, 18, 0.1);
            background-color: #fffaf0;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
            margin-top: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .alert-error {
            background-color: #ffe0e6;
            color: #d63031;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #d63031;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: shake 0.5s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .alert-error i {
            font-size: 1.3rem;
        }

        .remember-section {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            color: #666;
        }

        .remember-section input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .info-box {
            background: #f0f9ff;
            border-left: 4px solid #27ae60;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #2c3e50;
        }

        .info-box i {
            color: #27ae60;
            margin-right: 0.5rem;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem;
                margin: 1rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .logo-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-laptop"></i></div>
            <div class="logo-text">Nvision Informatica</div>
            <div class="logo-subtitle">Sistema de Atendimento</div>
        </div>

        {% if erro %}
        <div class="alert-error">
            <i class="fas fa-exclamation-circle"></i>
            {{ erro }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="usuario"><i class="fas fa-user"></i> Usuário</label>
                <input type="text" id="usuario" name="usuario" required placeholder="Digite seu usuário" autofocus>
            </div>

            <div class="form-group">
                <label for="senha"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
            </div>

            <div class="remember-section">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="margin: 0; font-weight: normal;">Lembrar-me</label>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Entrar no Sistema
            </button>
        </form>

        <div class="info-box">
            <i class="fas fa-shield-alt"></i>
            <strong>Segurança:</strong> Sua senha é protegida com hash. Não compartilhe suas credenciais.
        </div>
    </div>
</body>
</html>
